<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPKM El-Ma'rifah</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">
        <div class="left-panel">
            <div class="title-container">
                <h1>UPKM El-Ma'rifah</h1>
                <div class="dashed-line"></div>
            </div>
        </div>

        <div class="right-panel">
            <nav>
                <ul>
                    <li class="menu-biasa">
                        <a href="#berita" class="news-text">Berita</a>
                    </li>
                    <li class="dropdown">
                        <a href="#">Struktur</a>
                        <ul class="dropdown-content">
                            <li><a href="#">Divisi</a></li>
                            <li><a href="#">Pengurus</a></li>
                        </ul>
                    </li>
                    <li class="dropdown">
                        <a href="#">Album MSAA</a>
                        <ul class="dropdown-content">
                            <li><a href="#">2024</a></li>
                            <li><a href="#">2025</a></li>
                            <li><a href="#">2026</a></li>
                        </ul>
                    </li>
                    <li class="dropdown">
                        <a href="#">About Us</a>
                        <ul class="dropdown-content">
                            <li><a href="#">Visi</a></li>
                            <li><a href="#">Misi</a></li>
                            <li><a href="#">Mars</a></li>
                            <li><a href="#">Kontak</a></li>
                        </ul>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
    <main>
        <section class="berita-section" id="berita">
            <h2 class="section-title">Berita UPKM</h2>

            <div class="swiper mySwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide" data-text="Perkenalan Pengurus El-Ma'rifah">
                        <img src="assets/gambar-1.JPG" alt="Berita 1">
                    </div>
                    <div class="swiper-slide" data-text="Pelaksanaan Unity 2026">
                        <img src="assets/gambar-2.JPG" alt="Berita 2">
                    </div>
                    <div class="swiper-slide" data-text="Pelaksanaan Seminar Content Creator Unity 2026">
                        <img src="assets/gambar-3.JPG" alt="Berita 3">
                    </div>
                </div>
            </div>

            <div class="text-container">
                <p id="deskripsi-berita"></p>
            </div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <script>
        const swiper = new Swiper(".mySwiper", {
            slidesPerView: "auto",      
            centeredSlides: true,       
            spaceBetween: 30,           
            loop: true,                 
            
            // Auto geser setiap 10 detik
            autoplay: {
                delay: 10000,
                disableOnInteraction: false, 
            },

            // Event saat slide berganti untuk mengubah teks
            on: {
                init: function () {
                    updateText(this);
                },
                slideChangeTransitionStart: function () {
                    document.getElementById("deskripsi-berita").style.opacity = 0;
                },
                slideChangeTransitionEnd: function () {
                    updateText(this);
                    document.getElementById("deskripsi-berita").style.opacity = 1;
                }
            }
        });

        // Fungsi mengganti teks berdasarkan data-text
        function updateText(swiperInstance) {
            const activeSlide = swiperInstance.slides[swiperInstance.activeIndex];
            const newText = activeSlide.getAttribute("data-text");
            if (newText) {
                document.getElementById("deskripsi-berita").innerText = newText;
            }
        }
    </script>
</body>
</html>
